version: 2

project_name: codegate

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/codegate
    binary: codegate
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: ljdongz
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/ljdongz/codegate"
    description: "Remotely manage Claude Code sessions via Telegram"
    license: "MIT"
    dependencies:
      - name: tmux
      - name: bun
    install: |
      bin.install "codegate"
    test: |
      system "#{bin}/codegate", "--help"

release:
  github:
    owner: ljdongz
    name: codegate
